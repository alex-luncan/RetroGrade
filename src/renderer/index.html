<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:;">
  <title>RetroGrade - APK Decompiler</title>
  <script>window.global = window;</script>
  <script>
    // Prevent Electron's default file drop behavior globally
    // This must run before React to allow custom drag-drop handling
    // Don't stopPropagation so React handlers still receive events
    document.addEventListener('dragover', function(e) {
      e.preventDefault();
      if (e.dataTransfer) {
        e.dataTransfer.dropEffect = 'copy';
      }
    });
    document.addEventListener('drop', function(e) {
      e.preventDefault();
    });
    document.addEventListener('dragenter', function(e) {
      e.preventDefault();
    });
    document.addEventListener('dragleave', function(e) {
      e.preventDefault();
    });
  </script>
  <style>
    html, body, #root {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
